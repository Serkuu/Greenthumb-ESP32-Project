version: '3.8'

services:
  db:
    image: postgres:15
    container_name: greenthumb-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: serek2006
      POSTGRES_DB: greenthumb_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
